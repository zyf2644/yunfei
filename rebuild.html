<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04070f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Hand Ripple Rebuild</title>
    <link rel="stylesheet" href="./rebuild.css" />
  </head>
  <body>
    <main class="app">
      <video id="camera" autoplay playsinline muted></video>
      <canvas id="scene"></canvas>

      <section class="hud">
        <div class="title-block">
          <p class="eyebrow">PixiJS baseline</p>
          <h1>Hand Ripple Rebuild</h1>
        </div>

        <div class="controls">
          <button id="startBtn">Start camera</button>
          <button id="switchBtn" disabled>Switch camera</button>
          <button id="copyUrlBtn">Copy phone link</button>
        </div>

        <p id="status">Tap Start camera to begin.</p>
        <p id="connectionHint" class="hint"></p>
      </section>
    </main>

    <script type="module" src="./rebuild.js"></script>
  </body>
</html>
