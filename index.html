<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Finger Ripple</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04101a;
      --fg: #d9ebff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(114, 186, 226, 0.12), transparent 42%),
        radial-gradient(circle at bottom, rgba(7, 52, 88, 0.22), transparent 48%),
        var(--bg);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    canvas {
      display: block;
    }

    #video {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 180px;
      border: 1px solid rgba(217, 235, 255, 0.12);
      border-radius: 14px;
      opacity: 0.18;
      transform: scaleX(-1);
      pointer-events: none;
      filter: saturate(0.8) brightness(0.85);
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(6, 14, 22, 0.44);
      border: 1px solid rgba(217, 235, 255, 0.08);
      color: var(--fg);
      backdrop-filter: blur(14px);
      max-width: min(360px, calc(100vw - 36px));
      line-height: 1.45;
    }

    .hud strong {
      display: block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      margin-bottom: 4px;
    }

    .hud span {
      font-size: 14px;
      color: rgba(217, 235, 255, 0.82);
    }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Liquid Finger Ripple</strong>
    <span>Allow camera access, then move your index finger to stir transparent water ripples across the surface.</span>
  </div>
  <video id="video" playsinline autoplay muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
    camera.position.z = 1;

    const simScene = new THREE.Scene();
    const simCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
    simCamera.position.z = 1;

    const plane = new THREE.PlaneGeometry(2, 2);
    const clock = new THREE.Clock();

    const size = new THREE.Vector2(window.innerWidth, window.innerHeight);
    const texelSize = new THREE.Vector2(1 / window.innerWidth, 1 / window.innerHeight);
    const pointer = new THREE.Vector2(0.5, 0.5);
    const rawPointer = new THREE.Vector2(0.5, 0.5);
    const velocity = new THREE.Vector2();
    const lastPointer = new THREE.Vector2(0.5, 0.5);

    const video = document.getElementById("video");

    let handDetected = false;
    let lastDetectionTime = 0;

    function createTarget() {
      return new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        type: THREE.HalfFloatType,
        depthBuffer: false,
        stencilBuffer: false,
      });
    }

    let prevTarget = createTarget();
    let currTarget = createTarget();
    let nextTarget = createTarget();

    function clearTarget(target) {
      const previousColor = renderer.getClearColor(new THREE.Color());
      const previousAlpha = renderer.getClearAlpha();
      renderer.setRenderTarget(target);
      renderer.setClearColor(new THREE.Color(0, 0, 0), 1);
      renderer.clear();
      renderer.setRenderTarget(null);
      renderer.setClearColor(previousColor, previousAlpha);
    }

    clearTarget(prevTarget);
    clearTarget(currTarget);
    clearTarget(nextTarget);

    const backgroundCanvas = document.createElement("canvas");
    const backgroundContext = backgroundCanvas.getContext("2d");
    const backgroundTexture = new THREE.CanvasTexture(backgroundCanvas);
    backgroundTexture.wrapS = THREE.ClampToEdgeWrapping;
    backgroundTexture.wrapT = THREE.ClampToEdgeWrapping;
    backgroundTexture.minFilter = THREE.LinearFilter;
    backgroundTexture.magFilter = THREE.LinearFilter;

    function paintBackground() {
      const width = Math.max(256, Math.floor(window.innerWidth));
      const height = Math.max(256, Math.floor(window.innerHeight));

      backgroundCanvas.width = width;
      backgroundCanvas.height = height;

      const gradient = backgroundContext.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "#15324b");
      gradient.addColorStop(0.45, "#0a1e31");
      gradient.addColorStop(1, "#050d15");
      backgroundContext.fillStyle = gradient;
      backgroundContext.fillRect(0, 0, width, height);

      const glow = backgroundContext.createRadialGradient(width * 0.52, height * 0.24, width * 0.05, width * 0.52, height * 0.24, width * 0.62);
      glow.addColorStop(0, "rgba(180, 230, 255, 0.35)");
      glow.addColorStop(0.2, "rgba(110, 180, 220, 0.22)");
      glow.addColorStop(1, "rgba(0, 0, 0, 0)");
      backgroundContext.fillStyle = glow;
      backgroundContext.fillRect(0, 0, width, height);

      backgroundContext.strokeStyle = "rgba(190, 225, 255, 0.06)";
      backgroundContext.lineWidth = Math.max(1, width * 0.0012);
      for (let i = 0; i < 7; i += 1) {
        const y = height * (0.18 + i * 0.12);
        backgroundContext.beginPath();
        backgroundContext.moveTo(0, y);
        for (let x = 0; x <= width; x += 24) {
          const wave = Math.sin(x * 0.008 + i * 0.75) * height * 0.012;
          backgroundContext.lineTo(x, y + wave);
        }
        backgroundContext.stroke();
      }

      backgroundTexture.needsUpdate = true;
    }

    paintBackground();

    const simMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uCurrTexture: { value: currTarget.texture },
        uPrevTexture: { value: prevTarget.texture },
        uTexelSize: { value: texelSize.clone() },
        uFingerPos: { value: pointer.clone() },
        uFingerVelocity: { value: velocity.clone() },
        uWaveSpeed: { value: 0.24 },
        uDamping: { value: 0.995 },
        uActive: { value: 0.0 },
      },
      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;

        varying vec2 vUv;

        uniform sampler2D uCurrTexture;
        uniform sampler2D uPrevTexture;
        uniform vec2 uTexelSize;
        uniform vec2 uFingerPos;
        uniform vec2 uFingerVelocity;
        uniform float uWaveSpeed;
        uniform float uDamping;
        uniform float uActive;

        void main() {
          vec2 uv = vUv;
          float curr = texture2D(uCurrTexture, uv).r;
          float prev = texture2D(uPrevTexture, uv).r;

          vec2 finger = vec2(uFingerPos.x, 1.0 - uFingerPos.y);
          vec2 offset = uv - finger;
          float dist = length(offset);
          float speed = clamp(length(uFingerVelocity) * 0.02, 0.0, 1.0);

          float press = exp(-dist * 42.0);
          float ring = exp(-pow(max(dist - 0.028, 0.0) * 42.0, 2.0));
          float disturbance = (-press * 0.05 + ring * (0.015 + speed * 0.03)) * uActive;
          curr += disturbance;

          float left = texture2D(uCurrTexture, uv - vec2(uTexelSize.x, 0.0)).r;
          float right = texture2D(uCurrTexture, uv + vec2(uTexelSize.x, 0.0)).r;
          float down = texture2D(uCurrTexture, uv - vec2(0.0, uTexelSize.y)).r;
          float up = texture2D(uCurrTexture, uv + vec2(0.0, uTexelSize.y)).r;
          float laplacian = (left + right + up + down) - 4.0 * curr;

          // True second-order wave propagation so energy travels outward.
          float next = 2.0 * curr - prev + uWaveSpeed * laplacian;
          next *= uDamping;

          gl_FragColor = vec4(next, 0.0, 0.0, 1.0);
        }
      `,
    });

    const displayMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTexture: { value: currTarget.texture },
        uBackgroundTexture: { value: backgroundTexture },
        uResolution: { value: size.clone() },
        uTime: { value: 0 },
        uBumpStrength: { value: 3.4 },
      },
      vertexShader: `
        varying vec2 vUv;

        void main() {
          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;

        varying vec2 vUv;

        uniform sampler2D uTexture;
        uniform sampler2D uBackgroundTexture;
        uniform vec2 uResolution;
        uniform float uTime;
        uniform float uBumpStrength;

        void main() {
          vec2 uv = vUv;
          vec2 texel = 1.0 / uResolution;

          float center = texture2D(uTexture, uv).r;
          float left = texture2D(uTexture, uv - vec2(texel.x, 0.0)).r;
          float right = texture2D(uTexture, uv + vec2(texel.x, 0.0)).r;
          float down = texture2D(uTexture, uv - vec2(0.0, texel.y)).r;
          float up = texture2D(uTexture, uv + vec2(0.0, texel.y)).r;

          float dx = right - left;
          float dy = up - down;

          // A restrained bump scale keeps the surface watery instead of jagged.
          vec3 normal = normalize(vec3(-dx * uBumpStrength, -dy * uBumpStrength, 1.0));
          vec3 lightDir = normalize(vec3(-0.4, 0.6, 0.75));
          vec3 viewDir = normalize(vec3(0.0, 0.0, 1.0));
          vec3 halfVec = normalize(lightDir + viewDir);

          float diffuse = max(dot(normal, lightDir), 0.0);
          float spec = pow(max(dot(normal, halfVec), 0.0), 128.0);
          float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 4.0);

          vec2 refractUV = clamp(uv + normal.xy * 0.03, 0.0, 1.0);
          vec3 bgColor = texture2D(uBackgroundTexture, refractUV).rgb;

          vec3 waterBase = vec3(0.0, 0.1, 0.15);
          vec3 envColor = vec3(0.4, 0.6, 0.8);
          vec3 refractedWater = mix(bgColor, vec3(0.1, 0.4, 0.6), 0.2 + fresnel * 0.5);
          vec3 finalColor = mix(waterBase, envColor, fresnel);
          finalColor = mix(finalColor, refractedWater, 0.72);
          finalColor += diffuse * vec3(0.03, 0.08, 0.12);
          finalColor += spec * vec3(1.0, 0.95, 0.9);

          float depthTint = smoothstep(-0.02, 0.09, center);
          finalColor = mix(finalColor, finalColor + vec3(0.0, 0.05, 0.08), depthTint * 0.12);

          finalColor = 1.0 - exp(-finalColor * 1.2);
          gl_FragColor = vec4(finalColor, 1.0);
        }
      `,
    });

    const simMesh = new THREE.Mesh(plane, simMaterial);
    const displayMesh = new THREE.Mesh(plane, displayMaterial);
    simScene.add(simMesh);
    scene.add(displayMesh);

    function rotateTargets() {
      const temp = prevTarget;
      prevTarget = currTarget;
      currTarget = nextTarget;
      nextTarget = temp;

      simMaterial.uniforms.uPrevTexture.value = prevTarget.texture;
      simMaterial.uniforms.uCurrTexture.value = currTarget.texture;
      displayMaterial.uniforms.uTexture.value = currTarget.texture;
    }

    function recreateTargets() {
      prevTarget.dispose();
      currTarget.dispose();
      nextTarget.dispose();
      prevTarget = createTarget();
      currTarget = createTarget();
      nextTarget = createTarget();
      clearTarget(prevTarget);
      clearTarget(currTarget);
      clearTarget(nextTarget);
      simMaterial.uniforms.uPrevTexture.value = prevTarget.texture;
      simMaterial.uniforms.uCurrTexture.value = currTarget.texture;
      displayMaterial.uniforms.uTexture.value = currTarget.texture;
    }

    function resize() {
      size.set(window.innerWidth, window.innerHeight);
      texelSize.set(1 / window.innerWidth, 1 / window.innerHeight);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      recreateTargets();
      paintBackground();
      simMaterial.uniforms.uTexelSize.value.copy(texelSize);
      displayMaterial.uniforms.uResolution.value.copy(size);
    }

    window.addEventListener("resize", resize);

    window.addEventListener("pointermove", (event) => {
      if (handDetected) {
        return;
      }

      rawPointer.set(event.clientX / window.innerWidth, event.clientY / window.innerHeight);
    });

    async function setupHands() {
      const hands = new window.Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.65,
      });

      hands.onResults((results) => {
        const landmarks = results.multiHandLandmarks?.[0];

        if (landmarks?.[8]) {
          const tip = landmarks[8];
          const targetX = 1.0 - tip.x;
          const targetY = tip.y;
          const smoothing = 0.2;

          rawPointer.set(targetX, targetY);
          pointer.x += (targetX - pointer.x) * smoothing;
          pointer.y += (targetY - pointer.y) * smoothing;

          handDetected = true;
          lastDetectionTime = performance.now();
        } else if (performance.now() - lastDetectionTime > 250) {
          handDetected = false;
        }
      });

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 640 },
          height: { ideal: 480 },
          facingMode: "user",
        },
        audio: false,
      });

      video.srcObject = stream;
      await video.play();

      let sending = false;
      const processFrame = async () => {
        if (video.readyState >= 2 && !sending) {
          sending = true;
          try {
            await hands.send({ image: video });
          } finally {
            sending = false;
          }
        }

        requestAnimationFrame(processFrame);
      };

      processFrame();
    }

    setupHands().catch((error) => {
      console.error(error);
      document.querySelector(".hud span").textContent =
        "Camera access was blocked or unavailable. Move your pointer to preview the ripple effect instead.";
    });

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.033);
      const elapsed = clock.elapsedTime;

      if (!handDetected) {
        const smoothing = 1.0 - Math.pow(0.18, delta * 60.0);
        pointer.lerp(rawPointer, smoothing);
      }

      const targetVelocityX = (pointer.x - lastPointer.x) / Math.max(delta, 0.001);
      const targetVelocityY = (pointer.y - lastPointer.y) / Math.max(delta, 0.001);
      const velocitySmooth = 0.18;
      velocity.x += (targetVelocityX - velocity.x) * velocitySmooth;
      velocity.y += (targetVelocityY - velocity.y) * velocitySmooth;
      lastPointer.copy(pointer);

      simMaterial.uniforms.uFingerPos.value.copy(pointer);
      simMaterial.uniforms.uFingerVelocity.value.copy(velocity);
      simMaterial.uniforms.uActive.value = handDetected ? 1.0 : 0.9;

      displayMaterial.uniforms.uTime.value = elapsed;

      renderer.setRenderTarget(nextTarget);
      renderer.render(simScene, simCamera);
      renderer.setRenderTarget(null);

      displayMaterial.uniforms.uTexture.value = nextTarget.texture;
      renderer.render(scene, camera);

      rotateTargets();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
